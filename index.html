<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simulador de Parquímetro</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="estilos.css">
</head>
<body>
    <div class="container">
        <h1>Parquímetro</h1>
        <p>Insira o valor para calcular:</p>
        
        <input type="number" id="valorinserido" placeholder="R$ 0,00" step="0.05">
        
        <button onclick="calcularTempo()">Calcular</button>
        
        <div id="resultado">
            Tempo: 0 min | Troco: R$ 0.00
        </div>
    </div>

    <script src="script.js" defer></script>
</body>
</html>
